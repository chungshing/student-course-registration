<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
    <head>
        <meta charset="UTF-8" />
        <title>Register Student to Course</title>
    </head>
    <body>
        <h1>Student Course Registration System</h1>

        <hr />

        <a href="/">Home</a> | <a href="/students">Students</a> | <a href="/courses">Courses</a> |
        <a href="/register">Register</a> | <a href="/student-courses">Student Courses</a> |
        <a href="/logout">Logout</a>

        <hr />

        <h2>Register Student to Course</h2>

        <form th:action="@{/register}" method="post">
            <label>Student</label><br />
            <select name="studentId" required>
                <option value="">Select Student</option>
                <option
                    th:each="student : ${students}"
                    th:value="${student.id}"
                    th:text="${student.name}"
                ></option>
            </select>

            <br /><br />

            <label>Course</label><br />
            <select name="courseId" required>
                <option value="">Select Course</option>
                <option
                    th:each="course : ${courses}"
                    th:value="${course.id}"
                    th:text="${course.name}"
                ></option>
            </select>

            <br /><br />

            <button type="submit">Register</button>
        </form>

        <br />

        <p th:if="${error}" style="color: red" th:text="${error}"></p>
    </body>
</html>
